[agent]
  interval = "10s"
  flush_interval = "10s"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["grows/#"]
  data_format = "value"
  data_type = "float"

  # Parses grows/{node_id}/{sensor_id}/{metric}
  # segment[3] value (e.g. "temperature") becomes the measurement name
  # segment[1] and segment[2] become tags
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "grows/+/+/+"
    measurement = "_/_/_/measurement"
    tags = "_/node_id/sensor_id/_"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
